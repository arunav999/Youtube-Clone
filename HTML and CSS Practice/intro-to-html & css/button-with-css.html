<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Using HTML and CSS</title>
  <style rel="stylesheet">
    #sub{
      background-color: rgb(200, 0, 0);
      color: white;
      border: none;
      margin-right: 8px;
      margin-left: 20px;
      padding-top: 10px;
      padding-bottom: 10px;
      padding-left: 16px;
      padding-right: 16px;
      border-radius: 2px;
      cursor: pointer;
      margin-right: 8px;
      transition: opacity 0.5s;
      vertical-align: top;
    }
    #sub:hover{
      opacity: 0.8;
    }
    #sub:active{
      opacity: 0.5;
    }
    #join{
     background-color: white;
     border-color: rgb(41, 118, 211);
     border-style: solid;
     border-width: 1px;
     color: rgb(41, 118, 211);
     padding-top: 10px;
     padding-bottom: 10px;
     padding-left: 16px;
     padding-right: 16px;
     border-radius: 2px;
     cursor: pointer;
     transition: background-color 1s, color 1s;
     vertical-align: top;
    }
    #join:hover{
      background-color: rgb(41, 118, 211);
      color: white;
    }
    #join:active{
      opacity: 0.7;
    }
    #tweet{
      background-color: rgb(2, 158, 255);
      color: white;
      border: none;
      padding-top: 10px;
      padding-bottom: 10px;
      padding-left: 16px;
      padding-right: 16px;
      border-radius: 18px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      margin-left: 8px;
      cursor: pointer;
      transition: box-shadow 0.15s;
      vertical-align: top;
    }
    #tweet:hover{
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
    }
  </style>
  <!-- <link rel="stylesheet" href="button-with-css.css"> -->
</head>
<body>
  <p>
    <button id="sub">SUSCRIBE</button>
    <button id="join">JOIN</button>
    <button id="tweet">Tweet</button>
  </p>
